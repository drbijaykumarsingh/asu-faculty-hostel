<!DOCTYPE html>
<html lang="en-IN" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<meta name="theme-color" content="#2E7D32"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="application-name" content="ASU Faculty Hostel"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="ASU Hostel"/>
<meta name="msapplication-TileColor" content="#1B5E20"/>
<meta name="msapplication-TileImage" content="icon-144.png"/>
<meta name="description" content="Faculty Hostel stay tracker for Assam Skill University. Mark check-in/out dates and auto-calculate fees at ₹200/night."/>
<title>ASU Faculty Hostel</title>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png"/>
<link rel="apple-touch-icon" sizes="152x152" href="icon-152.png"/>
<link rel="apple-touch-icon" sizes="192x192" href="icon-192.png"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Roboto','Segoe UI',system-ui,sans-serif;background:#F5F5F5;min-height:100vh;max-width:480px;margin:0 auto;box-shadow:0 0 30px rgba(0,0,0,.15);}

/* STATUS BAR */
.status-bar{background:#1B5E20;color:#fff;display:flex;justify-content:space-between;padding:5px 14px;font-size:11px;letter-spacing:.4px;}

/* APP BAR */
.app-bar{background:#2E7D32;color:#fff;padding:10px 14px;display:flex;align-items:center;gap:11px;box-shadow:0 2px 8px rgba(0,0,0,.25);}
.app-logo{width:44px;height:44px;border-radius:10px;object-fit:contain;background:#fff;padding:3px;flex-shrink:0;border:1.5px solid rgba(255,255,255,.35);}
.app-logo-fallback{width:44px;height:44px;border-radius:10px;background:#1B5E20;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;border:1.5px solid rgba(255,255,255,.35);}
.app-bar-text{flex:1;}
.app-title{font-size:16px;font-weight:700;letter-spacing:.2px;}
.app-sub{font-size:10px;opacity:.82;margin-top:2px;}
.fee-badge{background:#1B5E20;border-radius:10px;padding:6px 11px;text-align:center;min-width:76px;flex-shrink:0;}
.fee-badge-amt{font-size:15px;font-weight:700;}
.fee-badge-lbl{font-size:10px;opacity:.8;margin-top:1px;}

/* TABS */
.tab-row{display:flex;background:#fff;border-bottom:2px solid #E0E0E0;}
.tab{flex:1;padding:10px 0;border:none;background:transparent;font-size:13px;font-weight:600;cursor:pointer;color:#757575;border-bottom:3px solid transparent;transition:color .2s;}
.tab.active{color:#2E7D32;border-bottom:3px solid #2E7D32;}

/* BODY */
.body{padding:12px 11px 28px;}

/* MONTH NAV */
.month-nav{display:flex;align-items:center;justify-content:space-between;background:#fff;border-radius:12px;padding:8px 11px;margin-bottom:9px;box-shadow:0 1px 4px rgba(0,0,0,.08);}
.nav-btn{background:#E8F5E9;border:none;border-radius:8px;width:38px;height:38px;font-size:24px;color:#2E7D32;cursor:pointer;font-weight:700;display:flex;align-items:center;justify-content:center;line-height:1;}
.nav-btn:active{background:#C8E6C9;}
.month-name{font-size:17px;font-weight:700;color:#212121;text-align:center;}
.year-lbl{font-size:12px;color:#757575;margin-top:1px;text-align:center;}

/* LEGEND */
.legend{display:flex;gap:14px;justify-content:center;margin-bottom:8px;font-size:11.5px;color:#555;}
.legend-item{display:flex;align-items:center;gap:4px;}
.dot{display:inline-block;width:12px;height:12px;border-radius:50%;}

/* DAY HEADERS */
.day-headers{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px;}
.day-hdr{text-align:center;font-size:11px;font-weight:700;color:#616161;padding:4px 0;letter-spacing:.2px;}
.day-hdr.sun{color:#E53935;}
.day-hdr.sat{color:#1565C0;}

/* CALENDAR GRID */
.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cell{height:46px;border-radius:10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;border:1px solid #E0E0E0;background:#fff;transition:transform .1s;user-select:none;}
.cell:active{transform:scale(.91);}
.cell.empty{background:transparent;border:none;cursor:default;pointer-events:none;}
.cell.checked{background:#2E7D32;border:2px solid #1B5E20;}
.cell.today:not(.checked){background:#E3F2FD;border:2px solid #1976D2;}
.cell.sun-col:not(.checked){color:#E53935;}
.cell.sat-col:not(.checked){color:#1565C0;}
.cell.checked .day-num{color:#fff;}
.day-num{font-size:14px;font-weight:600;line-height:1;}
.checkmark{font-size:9px;margin-top:1px;color:#fff;}
.hint{text-align:center;font-size:11px;color:#9E9E9E;margin-top:9px;}

/* MONTH SUMMARY BAR */
.month-summary{display:flex;justify-content:space-between;align-items:center;background:#E8F5E9;border-radius:10px;padding:10px 13px;margin-top:10px;border:1px solid #A5D6A7;}
.month-summary-text{font-size:13px;color:#2E7D32;}
.month-summary-fee{font-size:16px;font-weight:700;color:#1B5E20;}

/* SUMMARY TAB */
.total-card{background:#2E7D32;color:#fff;border-radius:16px;padding:20px 18px 16px;margin-bottom:12px;text-align:center;box-shadow:0 4px 12px rgba(46,125,50,.3);}
.total-lbl{font-size:11px;opacity:.85;letter-spacing:.5px;text-transform:uppercase;}
.total-days{font-size:42px;font-weight:700;margin:7px 0 3px;line-height:1;}
.total-days span{font-size:17px;font-weight:400;}
.total-fee{font-size:27px;font-weight:700;}
.total-rate{font-size:11px;opacity:.75;margin-top:4px;}

/* CSV EXPORT BUTTON */
.export-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;margin-bottom:14px;background:#E3F2FD;color:#1565C0;border:1.5px solid #90CAF9;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:background .15s;}
.export-btn:active{background:#BBDEFB;}
.export-icon{font-size:18px;}

/* MONTH CARDS */
.empty-state{text-align:center;padding:40px 20px;color:#9E9E9E;}
.empty-state .icon{font-size:48px;}
.empty-state p{margin-top:8px;font-size:14px;}
.empty-state small{font-size:12px;color:#BDBDBD;}
.month-card{background:#fff;border-radius:12px;padding:12px 13px;margin-bottom:9px;box-shadow:0 1px 4px rgba(0,0,0,.08);}
.month-card-hdr{display:flex;justify-content:space-between;align-items:center;}
.month-card-title{font-size:15px;font-weight:700;color:#212121;}
.month-card-fee{font-size:16px;font-weight:700;color:#2E7D32;}
.month-card-nights{font-size:12px;color:#757575;margin-top:2px;margin-bottom:7px;}
.chips{display:flex;flex-wrap:wrap;gap:5px;}
.chip{background:#E8F5E9;color:#1B5E20;border-radius:6px;padding:3px 9px;font-size:12px;font-weight:600;border:1px solid #A5D6A7;}
.clear-btn{display:block;width:100%;padding:12px;margin-top:4px;background:#FFEBEE;color:#C62828;border:1px solid #FFCDD2;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;}
.clear-btn:active{background:#FFCDD2;}

/* TOAST */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:#323232;color:#fff;padding:10px 20px;border-radius:24px;font-size:13px;font-weight:500;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;z-index:999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div class="status-bar">
  <span id="clock">--:--</span>
  <span>▲ ◉ ⬛</span>
</div>

<div class="app-bar">
  <img class="app-logo" id="asu-logo"
       src="https://asu.ac.in/asu_files/page/1206162892.jpeg"
       alt="ASU Logo"
       onerror="this.style.display='none';document.getElementById('logo-fallback').style.display='flex'"/>
  <div class="app-logo-fallback" id="logo-fallback" style="display:none">🏛️</div>
  <div class="app-bar-text">
    <div class="app-title">ASU Faculty Hostel</div>
    <div class="app-sub">Assam Skill University, Mangaldoi</div>
  </div>
  <div class="fee-badge">
    <div class="fee-badge-amt" id="hdr-fee">₹0</div>
    <div class="fee-badge-lbl" id="hdr-days">0d stay</div>
  </div>
</div>

<div class="tab-row">
  <button class="tab active" id="tab-btn-calendar" onclick="switchTab('calendar')">📅 Calendar</button>
  <button class="tab" id="tab-btn-summary" onclick="switchTab('summary')">🧾 Summary</button>
</div>

<!-- CALENDAR PANE -->
<div class="body" id="pane-calendar">
  <div class="month-nav">
    <button class="nav-btn" onclick="changeMonth(-1)" aria-label="Previous month">‹</button>
    <div>
      <div class="month-name" id="month-name">—</div>
      <div class="year-lbl" id="year-lbl">—</div>
    </div>
    <button class="nav-btn" onclick="changeMonth(1)" aria-label="Next month">›</button>
  </div>

  <div class="legend">
    <span class="legend-item"><span class="dot" style="background:#2E7D32"></span> Stayed</span>
    <span class="legend-item"><span class="dot" style="background:#E3F2FD;border:1.5px solid #90CAF9"></span> Today</span>
    <span class="legend-item"><span class="dot" style="background:#fff;border:1px solid #ddd"></span> Not in</span>
  </div>

  <div class="day-headers">
    <div class="day-hdr sun">Sun</div>
    <div class="day-hdr">Mon</div>
    <div class="day-hdr">Tue</div>
    <div class="day-hdr">Wed</div>
    <div class="day-hdr">Thu</div>
    <div class="day-hdr">Fri</div>
    <div class="day-hdr sat">Sat</div>
  </div>

  <div class="grid" id="calendar-grid"></div>
  <div class="hint">Tap a date to mark / unmark your stay</div>
  <div id="month-bar"></div>
</div>

<!-- SUMMARY PANE -->
<div class="body" id="pane-summary" style="display:none">
  <div class="total-card">
    <div class="total-lbl">Total Stay Duration</div>
    <div class="total-days" id="sum-days">0 <span>nights</span></div>
    <div class="total-fee" id="sum-fee">₹0</div>
    <div class="total-rate">@ ₹200 / night</div>
  </div>

  <button class="export-btn" onclick="exportCSV()" id="export-btn" style="display:none">
    <span class="export-icon">⬇️</span> Export Summary as CSV
  </button>

  <div id="sum-list"></div>
</div>

<div class="toast" id="toast"></div>

<footer style="text-align:center;padding:14px 10px 18px;font-size:11.5px;color:#888;background:#fff;border-top:1px solid #E0E0E0;margin-top:4px;">
  &copy; 2025 Designed &amp; Developed by&nbsp;
  <a href="https://drbijaykumarsingh.github.io/asu-faculty-hostel/"
     target="_blank"
     rel="noopener noreferrer"
     style="color:#2E7D32;font-weight:600;text-decoration:none;border-bottom:1px dotted #2E7D32;">
    Bijay Kumar Singh
  </a>
</footer>

<script>
const RATE = 200;
const MONTHS = ['January','February','March','April','May','June',
                'July','August','September','October','November','December'];
const today = new Date();
let viewYear = today.getFullYear();
let viewMonth = today.getMonth();
let checkedDates = loadDates();

function loadDates(){
  try{ return new Set(JSON.parse(localStorage.getItem('asu_hostel_dates')||'[]')); }
  catch(e){ return new Set(); }
}
function saveDates(){
  try{ localStorage.setItem('asu_hostel_dates', JSON.stringify([...checkedDates])); }catch(e){}
}
function dk(y,m,d){ return y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0'); }
function todayKey(){ return dk(today.getFullYear(), today.getMonth(), today.getDate()); }

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

function updateHeader(){
  const n = checkedDates.size;
  document.getElementById('hdr-fee').textContent = '₹'+(n*RATE).toLocaleString('en-IN');
  document.getElementById('hdr-days').textContent = n+'d stay';
}

function renderCalendar(){
  document.getElementById('month-name').textContent = MONTHS[viewMonth];
  document.getElementById('year-lbl').textContent = viewYear;
  const firstDay = new Date(viewYear, viewMonth, 1).getDay();
  const totalDays = new Date(viewYear, viewMonth+1, 0).getDate();
  const tKey = todayKey();
  let html = '';
  for(let i=0;i<firstDay;i++) html+='<div class="cell empty"></div>';
  for(let d=1;d<=totalDays;d++){
    const key = dk(viewYear,viewMonth,d);
    const dow = (firstDay+d-1)%7;
    const checked = checkedDates.has(key);
    const isToday = key===tKey;
    let cls = 'cell';
    if(checked) cls+=' checked';
    else if(isToday) cls+=' today';
    if(dow===0) cls+=' sun-col';
    if(dow===6) cls+=' sat-col';
    html+=`<div class="${cls}" onclick="toggle('${key}')" role="button" aria-label="Day ${d}${checked?' (stayed)':''}">
      <span class="day-num">${d}</span>${checked?'<span class="checkmark">✓</span>':''}
    </div>`;
  }
  document.getElementById('calendar-grid').innerHTML = html;

  const mStays = [...checkedDates].filter(k=>{
    const [y,m] = k.split('-').map(Number);
    return y===viewYear && m===(viewMonth+1);
  }).length;
  document.getElementById('month-bar').innerHTML = mStays>0
    ? `<div class="month-summary">
        <span class="month-summary-text">${MONTHS[viewMonth]}: <b>${mStays} night${mStays!==1?'s':''}</b></span>
        <span class="month-summary-fee">₹${(mStays*RATE).toLocaleString('en-IN')}</span>
       </div>` : '';
}

function renderSummary(){
  const total = checkedDates.size;
  document.getElementById('sum-days').innerHTML = total+' <span>night'+(total!==1?'s':'')+'</span>';
  document.getElementById('sum-fee').textContent = '₹'+(total*RATE).toLocaleString('en-IN');
  document.getElementById('export-btn').style.display = total>0 ? 'flex' : 'none';

  if(total===0){
    document.getElementById('sum-list').innerHTML =
      '<div class="empty-state"><div class="icon">🗓️</div><p>No stays marked yet.</p><small>Go to Calendar and tap dates.</small></div>';
    return;
  }

  const groups={};
  for(const k of checkedDates){
    const [y,m,d]=k.split('-').map(Number);
    const gk=y+'-'+String(m).padStart(2,'0');
    if(!groups[gk]) groups[gk]={year:y,month:m-1,days:[]};
    groups[gk].days.push(d);
  }
  Object.values(groups).forEach(g=>g.days.sort((a,b)=>a-b));
  const sorted=Object.entries(groups).sort(([a],[b])=>a.localeCompare(b));

  let html='';
  for(const[,{year,month,days}] of sorted){
    html+=`<div class="month-card">
      <div class="month-card-hdr">
        <span class="month-card-title">${MONTHS[month]} ${year}</span>
        <span class="month-card-fee">₹${(days.length*RATE).toLocaleString('en-IN')}</span>
      </div>
      <div class="month-card-nights">${days.length} night${days.length!==1?'s':''}</div>
      <div class="chips">${days.map(d=>'<span class="chip">'+String(d).padStart(2,'0')+'</span>').join('')}</div>
    </div>`;
  }
  html+=`<button class="clear-btn" onclick="clearAll()">🗑️ Clear All Stays</button>`;
  document.getElementById('sum-list').innerHTML=html;
}

/* ── CSV EXPORT ─────────────────────────────────────── */
function exportCSV(){
  if(checkedDates.size===0){ showToast('No stays to export.'); return; }

  // Sort all dates
  const sorted = [...checkedDates].sort();

  // Header rows (hostel info)
  let csv = 'ASU Faculty Hostel - Stay Summary\n';
  csv += 'Assam Skill University, Mangaldoi, Darrang, Assam\n';
  csv += 'Exported on:,' + new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'long',year:'numeric'}) + '\n';
  csv += 'Rate per night (₹):,' + RATE + '\n';
  csv += '\n';

  // Day-by-day detail
  csv += 'Sl. No.,Date,Day,Month,Year,Fee (₹)\n';
  const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  sorted.forEach((key, idx) => {
    const [y,m,d] = key.split('-').map(Number);
    const dt = new Date(y, m-1, d);
    const dayName = dayNames[dt.getDay()];
    const monthName = MONTHS[m-1];
    csv += `${idx+1},${String(d).padStart(2,'0')}-${String(m).padStart(2,'0')}-${y},${dayName},${monthName},${y},${RATE}\n`;
  });

  csv += '\n';

  // Month-wise summary
  csv += 'MONTH-WISE SUMMARY\n';
  csv += 'Month,Year,Nights Stayed,Amount (₹)\n';
  const groups={};
  for(const k of sorted){
    const [y,m] = k.split('-').map(Number);
    const gk = y+'-'+String(m).padStart(2,'0');
    if(!groups[gk]) groups[gk]={year:y,month:m-1,count:0};
    groups[gk].count++;
  }
  let grandNights=0, grandAmt=0;
  for(const [,{year,month,count}] of Object.entries(groups).sort()){
    const amt = count*RATE;
    grandNights+=count; grandAmt+=amt;
    csv += `${MONTHS[month]},${year},${count},${amt}\n`;
  }
  csv += `TOTAL,,${grandNights},${grandAmt}\n`;

  // Download
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const now = new Date();
  a.download = `ASU_Hostel_Stay_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('✅ CSV exported successfully!');
}

/* ── CORE FUNCTIONS ─────────────────────────────────── */
function toggle(key){
  checkedDates.has(key)?checkedDates.delete(key):checkedDates.add(key);
  saveDates(); updateHeader(); renderCalendar();
}
function changeMonth(dir){
  viewMonth+=dir;
  if(viewMonth>11){viewMonth=0;viewYear++;}
  if(viewMonth<0){viewMonth=11;viewYear--;}
  renderCalendar();
}
function clearAll(){
  if(confirm('Clear all marked stays? This cannot be undone.')){
    checkedDates.clear(); saveDates(); updateHeader(); renderCalendar(); renderSummary();
  }
}
function switchTab(t){
  document.getElementById('pane-calendar').style.display = t==='calendar'?'block':'none';
  document.getElementById('pane-summary').style.display  = t==='summary' ?'block':'none';
  document.getElementById('tab-btn-calendar').classList.toggle('active', t==='calendar');
  document.getElementById('tab-btn-summary').classList.toggle('active', t==='summary');
  if(t==='summary') renderSummary();
}

// URL shortcut params
(function(){
  const p = new URLSearchParams(location.search);
  if(p.get('tab')==='summary') switchTab('summary');
  if(p.get('action')==='today'){
    const k = todayKey();
    if(!checkedDates.has(k)){ checkedDates.add(k); saveDates(); }
  }
})();

// Clock
function tick(){
  const n=new Date();
  document.getElementById('clock').textContent=n.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
}
tick(); setInterval(tick,15000);

// Init
updateHeader(); renderCalendar();

// Service Worker
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js',{scope:'/'})
      .then(reg=>{
        reg.addEventListener('updatefound',()=>{
          const nw=reg.installing;
          nw.addEventListener('statechange',()=>{
            if(nw.state==='installed'&&navigator.serviceWorker.controller)
              nw.postMessage({type:'SKIP_WAITING'});
          });
        });
      }).catch(()=>{});
  });
}
</script>
</body>
</html>
